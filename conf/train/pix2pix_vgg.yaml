# @package _group_
# Usage: python -m SRNet.train train=pix2pix_vgg
# Inherit from the base class
defaults:
  - base        # pull in conf/train/base.yaml
  - _self_      # then override with the keys in THIS file

# high-level
model: pix2pix
name: pix2pix_VGG

# data / mode (do NOT set dataset group here; that's controlled by `defaults.dataset`)
dataset_mode: aligned
use_DEM: true

# optimization
batch_size: 8
beta1: 0.5
beta2: 0.999
lrD: 0.0002
lrG: 0.0002
D_steps_per_G: 1
lr_policy: cosine
cosine_warmup_T_mult:
cosine_warmup_eta_min:
lr_decay_iters: 200

# GAN / nets
gan_mode: hinge
netD: attention_n_layers
n_layers_D: 4
ndf: 64
ngf: 64
attention_layer_depth: 16
dropout_D: 0.1
dropout_G: 0.1
relativisticD: false
residual_network: false
norm: instance
D_warmup_D_steps: 2
D_warmup_epochs: 0

# reconstruction loss
type_loss: VGG
lambda_selected_loss: 20.0          # keep if your training loop still reads this
additional_lambda_l1: 2

# aug / loader
aug_crop_size: 256
num_workers: 4
prefetch_factor: 6
zero_shadows_in_D: false

# misc
clearml_project: deshadow
no_html: true
display_id: 0

