defaults:
  - pix2pix_vgg        # pull in conf/train/base.yaml
  - _self_      # then override with the keys in THIS file


name: pix2pix_vgg_DEM_zero_shadows_colour_consistency_in_HVS_plateau_LR
use_DEM: true
lambda_color_consistency:
type_loss_G_colour:
lambda_hvs_l1: 10.0
zero_shadows_in_D: true

# optimization
batch_size: 8
beta1: 0.5
beta2: 0.999
lrD: 0.0002
lrG: 0.0002
D_steps_per_G: 1
lr_policy: step
cosine_warmup_T_mult:
cosine_warmup_eta_min:
lr_decay_iters: 50